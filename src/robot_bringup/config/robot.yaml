# =============================================================================
# Central hardware/parameter config for the Nano robot.
# All values are tuned for the NanoPi NEO Plus2 (Allwinner H5) — cross-check pin
# / bus choices against ../../nanopi-neo-plus2-pinmap.md.
#
# Bus reminders from the pinmap:
#   I2C0 -> /dev/i2c-0 (PA11/PA12)   I2C1 -> /dev/i2c-1 (PA18/PA19)
#   I2C2 -> /dev/i2c-2 (PE12/PE13)   UART2 -> /dev/ttyS2 (PA0/PA1)
#   UART1 -> /dev/ttyS1 (PG6/PG7) -- normally on-board Bluetooth; freed via the
#            `uart1` overlay (Bluetooth disabled) for the ESP32 zenoh-pico link.
#   GPIO main PIO = /dev/gpiochip0, global# = bank*32 + pin (PA0=0, PG=192, ...)
# Enable the buses first via armbianEnv.txt overlays (see README + pinmap).
# =============================================================================

# ---- LDS02RR lidar driver (lds_driver_py; node name "lds_driver") -----------
# Publishes sensor_msgs/LaserScan on /scan + the /dev/shm scan blob for the web UI.
lds_driver:
  ros__parameters:
    port: "/dev/ttyS2"        # LDS02RR data UART on UART2/PA0-PA1 (@115200). ttyS1 is the
                              # ESP32 zenoh link now; needs the `uart2` overlay (sbc-setup.sh).
    baud: 115200
    frame_id: "laser"
    clockwise: true           # LDS02RR spins CW; node converts to ROS CCW frame
    angle_offset_deg: 0.0     # mechanical mounting offset of the 0deg ray
    range_min: 0.12           # metres
    range_max: 6.0            # metres
    publish_rate: 10.0        # Hz cap on /scan (motor ~5 Hz; lower = decimate)

# ---- Wheel encoders -> odometry (nav_msgs/Odometry on /odom + TF) -----------
# Wheel ticks are counted on the ESP32 coprocessor and streamed as
# std_msgs/Int64MultiArray on /wheel_ticks; this node only integrates. Wire/
# direction fixes are #defines at the top of firmware/nanobot_coprocessor/src/main.cpp.
wheel_odometry:
  ros__parameters:
    ticks_topic: "wheel_ticks"  # from the ESP32 zenoh-pico coprocessor
    ticks_per_rev: 1440       # encoder counts per wheel revolution (single-channel
                              # rising edges; NOT quadrature — needs an on-hardware
                              # check against measured travel, see docs/TODO.md)
    wheel_radius: 0.0335      # metres
    wheel_separation: 0.16    # metres between wheel contact points
    invert_left: false        # SBC-side fallback (normally inverted on the ESP32)
    invert_right: false
    publish_rate: 10.0        # Hz, odom/TF publish rate (retunable live via web UI slider;
                               # matches slam_nav's control_rate, was 15 — cuts executor
                               # wakeups in sensor_hub/slam_nav/app_hub with no functional loss)
    publish_tf: true
    odom_frame: "odom"
    base_frame: "base_link"

# ---- cmd_vel -> PCA9685 PWM motor driver ------------------------------------
# RETIRED: the ESP32 coprocessor now owns /cmd_vel -> H-bridge PWM directly (see
# firmware/nanobot_coprocessor). This node is no longer launched by stack.sh; kept
# here only for the optional PCA9685 LDS-spin/aux channels if you re-enable it.
motor_control:
  ros__parameters:
    i2c_bus: 1                # /dev/i2c-1
    i2c_address: 0x40         # PCA9685 default
    pwm_freq_hz: 1000.0       # motor-driver PWM carrier (servos: use 50)
    # Differential drive limits.
    wheel_separation: 0.16
    max_linear_speed: 0.4     # m/s mapped to full PWM
    max_angular_speed: 3.0    # rad/s mapped to full PWM
    cmd_timeout: 0.5          # s; stop motors if no /cmd_vel arrives
    # PCA9685 channel wiring. Two channels per motor when driving an H-bridge
    # in PWM+PWM mode (forward channel / reverse channel).
    left_fwd_ch: 0
    left_rev_ch: 1
    right_fwd_ch: 2
    right_rev_ch: 3
    # Optional: drive the LDS spin motor at a constant duty from a spare channel.
    lds_motor_ch: -1          # -1 = disabled
    lds_motor_duty: 0.55

# ---- 2D occupancy-grid SLAM (slam_nav) --------------------------------------
# Builds a map from /scan with the pose = wheel odom translation + IMU yaw,
# refined by a correlative scan-to-map matcher. Writes /dev/shm/nano_map.bin for
# the web UI map panel. Stage 1 = mapping only (no motion). All sizes/RAM scale
# with map_size_m / map_resolution: 24 m @ 0.05 m = 480x480 cells (~0.9 MB grid).
slam_nav:
  ros__parameters:
    scan_topic: "scan"
    odom_topic: "odom"
    euler_topic: "imu/euler"       # /imu/euler vector.z = yaw in degrees
    map_size_m: 24.0               # square map side, metres (whole-floor)
    map_resolution: 0.05           # metres/cell
    range_min: 0.12
    range_max: 6.0
    match_lin: 0.10                # scan-match search half-window (m)
    match_ang: 0.12                # scan-match search half-window (rad)
    match_points: 90               # scan beams used for matching (decimated)
    min_match_score: 1.0           # reject matches with no real map overlap
    use_imu_yaw: true              # IMU yaw delta for rotation (vs wheel odom)
    # Parked = skip: when odom AND IMU both say the robot hasn't moved since the last
    # processed scan, skip the scan-match + map-integrate (the bulk of parked idle
    # CPU). Full SLAM resumes on the first scan past either threshold; pure rotation
    # fires via the yaw delta. Never skips while seeding/recovering/self-testing.
    still_skip: true
    still_lin: 0.005               # m: odom translation that counts as "moved"
    still_ang: 0.005               # rad (~0.3 deg): yaw delta that counts as "moved"
    map_write_rate: 2.0            # Hz to refresh the /dev/shm map file
    # --- navigation (click-to-go) ---
    enable_motion: false           # SAFETY: false = plan + show path but DON'T drive.
                                   # Flip live from the web UI "enable motion" toggle.
    robot_radius: 0.16             # obstacle inflation for the planner (m). Live-tunable:
                                   # web UI Sensors -> Navigation (slam_nav).
    plan_downsample: 4             # plan on a 1/N grid (CPU/RAM); 4 = 0.20 m cells
    allow_unknown: true            # let the global plan cross unmapped cells
    control_rate: 10.0             # Hz pursuit/controller loop
    replan_period: 1.0             # s between global replans while a goal is active
    max_lin: 0.15                  # m/s pursuit speed cap (start gentle). Live-tunable.
    max_ang: 1.0                   # rad/s turn-rate cap. Live-tunable.
    lookahead: 0.30                # m pure-pursuit lookahead
    goal_tol: 0.12                 # m: within this of the goal = arrived
    stop_distance: 0.25            # m: obstacle this close ahead = stop + replan. Live-tunable.
    front_angle: 0.6               # rad: half-width of the reactive front cone
    # --- extras (each independently toggleable; behaviour-changers default OFF for
    #     easy/safe testing — flip them on one at a time) ---
    map_store: ""                  # persist the map here (.npz). "" = disabled. To enable,
                                   # set an absolute path e.g. "/home/ibster/nano_map.npz";
                                   # it auto-loads on boot + saves on the /slam_nav/save_map
                                   # button. (Don't use /dev/shm — that's RAM, lost on reboot.)
    autosave_period: 0.0           # s between background map autosaves; 0 = off (manual only)
    auto_explore: false            # autonomously drive to map frontiers when idle.
                                   # Still needs enable_motion to actually move; with motion
                                   # off it just shows where it *would* explore.
    explore_period: 4.0            # s between frontier picks while exploring
    trail_max: 400                 # breadcrumb ring-buffer length (where it's been); 0 = off
    stuck_timeout: 0.0             # s of commanded-but-no-motion before aborting goal; 0 = off.
                                   # Live-tunable.
    stuck_eps: 0.04                # m: movement below this counts as "not moving"
    goal_no_path_timeout: 20.0     # s with zero path found before giving up on the goal;
                                   # 0 = off (never give up). Without this an unreachable
                                   # goal sits latched forever and -- since a set goal counts
                                   # as "needs scans" -- also silently blocks LDS idle
                                   # spin-down forever. Live-tunable.
    # --- LDS idle spin-down: park the spin motor (power/wear/noise) once there's no
    #     reason to expect fresh scans soon -- stationary, no goal, not exploring, not
    #     picked up/relocalizing. Wakes instantly the moment any of those change. ---
    lds_idle_enable: true          # master on/off for the spin-down behaviour. Live-tunable.
    lds_idle_timeout: 10.0         # s of no motion/goal/exploring before spin-down; 0 = off.
                                   # Live-tunable.
    lds_idle_rpm: 0.0              # target rpm while parked (0 = fully stop). Live-tunable.
    lds_active_rpm: 300.0          # target rpm to resume; match firmware LDS_TARGET_RPM.
                                   # Live-tunable.
    # --- pick-up awareness + lost-robot relocalization (autonomy) ---
    pickup_pause: true             # both off-ground switches -> halt + freeze SLAM while carried.
                                   # Live-tunable.
    pickup_face: "focused"         # OLED mood shown while lifted ("" = leave the OLED alone)
    relocalize: true               # auto-recover the pose when scans stop matching the map.
                                   # Live-tunable.
    recover_patience: 5            # consecutive unmatched scans before declaring "lost"
    recover_min_beams: 40          # need this many in-range beams to trust a "mismatch"
    recover_exit_score: 4.0        # scan-match score that ends recovery (relocalized)
    recover_lin: 0.5               # recovery search half-window (m) around the prior
    recover_ang: 1.0               # recovery search half-window (rad)
    recover_half: 6                # recovery candidates per axis (2*half+1)
    recover_refine: 3              # recovery coarse-to-fine passes
    recover_spin: 0.6              # rad/s in-place spin while relocalizing (needs enable_motion)
    recover_timeout: 12.0          # s before giving up the active relocalize search
    # --- personality -> motion (the behaviour layer's `caution` trait) ---
    # OFF by default (it touches motion). When on, slam_nav subscribes /cognition/traits and
    # eases stop_distance up + max_lin down with `caution`, CLAMPED here to safe bounds — the
    # cognitive layer can influence but never override motion safety (max_lin/stop_distance
    # above are the relaxed caution=0 end).
    trait_motion: false            # let `caution` nudge the reactive motion thresholds
    stop_distance_max: 0.45        # m: stop_distance at caution=1 (stops earlier when wary)
    max_lin_min: 0.08              # m/s: max_lin at caution=1 (drives slower when wary)
    # --- vision target tracking (pan-only: turn in place to keep a calibrated
    # colour-blob centered in the camera frame). Reads /vision/state (web_control's
    # GPU-vision feed) for the target's normalized x position + confidence. OFF by
    # default; when on it WINS over goal-follow/auto-explore (the whole point of
    # turning it on is "look at this now") but is still gated by enable_motion and
    # still yields to pick-up/self-test/relocalization like everything else here.
    track_enable: false            # master toggle. Live-tunable (web "🎯 Track target").
    track_kp: 2.0                  # angular gain: rad/s commanded per unit of x-error (-0.5..0.5)
    track_kd: 0.5                  # damping: rad/s commanded per rad/s of the robot's OWN
                                    # measured yaw rate (IMU), opposing it -- brakes against
                                    # real turning momentum near the setpoint (see nav_node's
                                    # track_step docstring, 2026-07-16 3rd finding)
    track_max_ang: 2.0             # rad/s cap for tracking turns (independent of nav's max_ang).
                                    # Raised 2026-07-16 from 0.8: the ESP32's stiction/deadzone
                                    # remap means real motor duty barely rises across this whole
                                    # range, so a higher cap is nearly free extra tracking speed
                                    # (MAX_ANGULAR_SPEED, firmware, is the true ceiling at 3.0)
    track_min_eff_ang: 0.2         # rad/s: smallest turn rate that reliably moves the wheels at
                                    # all (the ESP32's stiction compensation means anything
                                    # commanded below ~0.16 rad/s produces zero motion, not a
                                    # slow crawl) -- below this, track_step time-dithers full-
                                    # floor pulses instead of asking for a rate the hardware
                                    # can't produce (2026-07-16 4th finding)
    track_deadband: 0.04           # normalized x-error within this = already centered, don't turn
    track_conf_min: 0.02           # ignore target reports below this confidence (too small/noisy)
    track_timeout: 0.6             # s: no fresh target/vision-state past this -> stop turning

    # --- self-test / calibration (scripted forward/back/spin drive that cross-checks
    # IMU vs encoders). Was module constants; now params so the SPIN-check investigation
    # (see selftest-spin-imu-mismatch memory) can retune live instead of by edit.
    test_lin: 0.12                 # m/s forward/back speed (capped by max_lin)
    test_ang: 0.6                  # rad/s in-place spin speed (capped by max_ang)
    test_dist: 0.35                # m to drive forward, then back
    test_turns: 1.0                # full in-place rotations for the IMU-vs-odom cross-check
    test_settle: 1.2               # s to settle between motion legs

# ---- Status -> SSD1306 OLED -------------------------------------------------
oled_display:
  ros__parameters:
    i2c_bus: 0                # /dev/i2c-0 (OLED wired to I2C0, PA11/PA12)
    i2c_address: 0x3C         # SSD1306 default
    width: 128
    height: 64
    refresh_rate: 1.0         # Hz (clock shows HH:MM:SS; 1 Hz keeps seconds live)
    show_ip: true             # show the wlan/eth IP so you can find the web UI
    rotate: 2                 # 90° steps; 2 = 180° — panel is mounted upside-down
    idle_face: neutral        # resting face shown between beats (the face is the default screen)
    dashboard: false          # boot default: false = show the face; true = pin the status panel
    show_words: true          # boot default: show TTS karaoke words (false keeps the face up)

# ---- BWT901CL 9-axis IMU (WitMotion, USB-serial via CH340) ------------------
imu_driver:
  ros__parameters:
    port: "/dev/imu"          # stable udev symlink (CH340 by VID:PID, any USB port)
    baud: 115200              # BWT901CL is fixed at 115200
    frame_id: "imu_link"
    publish_rate: 1.0         # Hz; /imu/data rate (slider 1..200; raise live for tuning).
                              # The device stream rate auto-follows this (1 Hz = minimal
                              # CPU/serial load; also caps euler/web/mag output below).
    euler_rate: 5.0           # Hz; /imu/euler only feeds the web angle display (via the
                              # vitals blob, not the raw topic) — sys_monitor is the only
                              # subscriber and just wants the freshest sample, so this only
                              # matters as a cap if publish_rate is ever raised live
    mag_rate: 10.0            # Hz; /imu/mag is slow-moving + unused by the UI
    web_rate: 5.0             # Hz; /imu/web (|accel|,|gyro|,rate) summary — same story as
                              # euler_rate above, sys_monitor-only, no raw-topic UI reader
    output_rate_hz: 0         # 0 = device streams at publish_rate; >0 pins it
    bandwidth_hz: 0           # internal analog low-pass filter (register 0x1F); 0 = leave
                              # device default. Lower (e.g. 10 or 5) rejects motor/chassis
                              # vibration noise at the source, at the cost of response lag.
                              # Nearest of 256/188/98/42/20/10/5 Hz is programmed.
    # Mounting offset from base_link's centre (REP-103: x=fwd, y=left, z=up), mm.
    # Web-editable (IMU card). If nonzero, accel is corrected for the lever-arm
    # (centripetal + tangential) effect of rotating off-centre before publish —
    # see lever_arm_correction() in imu_node.py. Gyro needs no correction.
    offset_x_mm: 0.0
    offset_y_mm: 0.0
    offset_z_mm: 0.0
    # Mounting ROTATION (separate from the translation offset above): the sensor
    # board's fixed orientation on the chassis, as a full roll/pitch/yaw rotation
    # (degrees, ZYX convention) — not just a flat spin. Covers a board glued down
    # twisted sideways (yaw) AND/OR tipped up on an edge (roll/pitch). Corrects
    # accel/gyro/mag (all 3 axes) and reconstructs roll/pitch/yaw via proper
    # rotation-matrix composition — see mount_matrix()/rotate_mount()/
    # correct_orientation() in imu_node.py. All left at 0 (unconfirmed) —
    # determine the real values empirically: rest the robot flat and note
    # roll/pitch/yaw, then prop up ONLY the front (isolated pitch) and note which
    # reported angle actually moves, then flat again and prop up ONLY one side
    # (isolated roll) and note which reported angle moves. Whichever angle
    # responds to which physical tilt reveals the axis mapping directly.
    mount_roll_deg: 0.0
    mount_pitch_deg: 0.0
    mount_yaw_deg: 0.0
    # A web-UI change to either the offset or rotation above persists here (default
    # ~/.local/state/nanobot/imu_mount.json) and wins over the values above on the
    # next start, same "outlives a restart" contract as tts_settings_path.
    mount_settings_path: ""

# ---- Dev-PC-only: Gazebo hardware stand-in (see bringup.launch.py sim:=true) ------------
# Not launched on the board. Replaces lds_driver/imu_driver's hardware reads with Gazebo
# Sim + ros_gz_bridge; sim_bridge converts the bridged joint/imu/scan topics into the
# exact contracts the real hardware nodes publish (see sim_hardware/sim_bridge_node.py).
sim_bridge:
  ros__parameters:
    ticks_per_rev: 1440       # MUST match wheel_odometry.ticks_per_rev above
    left_wheel_joint: "left_wheel_joint"
    right_wheel_joint: "right_wheel_joint"
    invert_left: false
    invert_right: false
    esp_temp: 34.0            # constant "healthy" synthetic board telemetry
    lds_rpm: 300.0
    lds_hz: 5.0
    heartbeat_rate: 1.0       # Hz

# Republishes slam_nav's /dev/shm/nano_map.bin as nav_msgs/OccupancyGrid on /map, for
# RViz. Useful on the real robot too (not sim-specific) -- see sim_hardware/map_bridge_node.py.
map_bridge:
  ros__parameters:
    map_file: "/dev/shm/nano_map.bin"
    frame_id: "odom"          # matches slam_nav seeding its pose straight from /odom
    publish_rate: 2.0         # Hz

# ---- Board health monitor -> diagnostic_msgs/DiagnosticArray on /diagnostics -
sys_monitor:
  ros__parameters:
    publish_rate: 1.0         # Hz; CPU/mem/temp/disk are slow-moving
    # Durable health-event log: timestamped ESP32-link/LDS outage transitions with a
    # classified cause (sys_monitor/health_log.py), for diagnosing intermittent
    # failures after the fact. Survives reboots/stack restarts.
    health_log_path: "~/.local/state/nanobot/health.log"
    # Cooling fan: publishes a PWM duty (0..1) on /fan_pwm that the ESP32 actuates
    # (firmware FAN_PIN). Auto curve ramps the fan with the SBC CPU temperature; the
    # web UI Fan card overrides it (sets fan_override) and can retune where the ramp
    # starts (fan_temp_min, "Fan starts at") and its floor (fan_min_duty, "Floor duty").
    # All retunable live.
    fan_temp_min: 50.0        # °C: below this the fan is fully OFF (not fan_min_duty)
    fan_temp_max: 70.0        # °C: at/above this the fan runs at fan_max_duty
    fan_min_duty: 0.30        # 0..1 duty at the bottom of the ramp, right at fan_temp_min —
                              # a floor above the fan's stall/dead-band duty, so the ramp
                              # doesn't spend its low end spinning the fan too weakly to move
                              # air (same issue the wheel motors had, see MOTOR_MIN_DUTY).
                              # Only applies once cpu_temp crosses fan_temp_min; below that
                              # the fan is off, not idling at this duty.
    fan_max_duty: 1.0         # 0..1 duty at/above fan_temp_max
    fan_smooth_alpha: 0.15    # 0..1 EMA smoothing on the auto-curve duty (1.0 = unsmoothed);
                              # lower = slower/smoother fan response to CPU-temp noise
    fan_override: -1.0        # <0 = auto (use the curve); 0..1 = forced fixed duty

# ---- Behaviour layer (Sismic statechart) ------------------------------------
# First node of the behaviour layer: an idle "feel alive" presence supervisor. It is
# expression-ONLY — it drives the OLED face (/oled_face) during true idle and stands
# down (touches nothing) the moment another owner uses the panel (motion/goal, TTS
# speech, a manual web mood, or pick-up). It NEVER publishes /cmd_vel, so it can't
# affect motion safety; if sismic isn't installed it runs as a no-op.
behavior:
  ros__parameters:
    enable: true              # false = node spins but does nothing (easy kill switch)
    tick_rate: 4.0            # Hz the statechart is stepped (after() time resolution)
    greet_secs: 3.0           # boot "hello" happy-face duration, then -> dashboard
    idle_secs: 90.0           # s of continuous idle before a brief liveliness beat
    perform_secs: 4.0         # s the liveliness "look around" beat lasts
    motion_eps: 0.02          # |cmd_vel| above this counts as the robot moving
    motion_hold: 1.2          # s after the last motion still counted as "active"
    speak_timeout: 5.0        # s without an /oled_word before "not speaking" again
    # --- LLM enrichment of the idle beats (additive; the chart is the single brain) ---
    # Each idle cycle the chart picks ONE beat via a priority-weighted, novelty-aware lottery
    # over the enabled registry beats — musing (sensors), looking (camera), wondering (a deep-
    # question musing), listening (reacts to the mic). The per-beat weights (priority) live in
    # personality.json's registry and are LEARNABLE (LLM reflection nudges them), so the idle
    # mix drifts with the robot's mood/reward. On a beat the node shows a predefined face
    # immediately AND (if enabled) fires a fire-and-forget /cognition/request that web_control
    # executes asynchronously (LLM line + optional camera/mic + mood). Best-effort: a slow/absent
    # LLM = a silent face beat. web_control.llm_enabled is the real master switch.
    enrich_enable: true       # publish /cognition/request on the idle beats
    enrich_min_interval: 45.0 # s, per-beat rate-limit so a fast chart can't spam the API
    camera_beats: true        # allow the autonomous camera ("looking") beat at all
    # --- skill library: let the brain pick a capability (skills/*.md) on a beat ---
    # Every Nth body (musing) beat becomes a "skill" beat: web_control picks the most fitting
    # skill from the library and performs it. Goals (pursuing) take the slot first, then
    # skills. The gated action tier is governed by web_control.skills_allow_actions (off).
    skills_enable: true       # allow the autonomous skill beat (false = never auto-pick skills)
    skill_every: 6            # a skill beat in place of every Nth musing beat (>=1)
    greet_face: "happy"       # "startup mood": OLED face shown at boot (the greeting beat)
    # --- personality / evolution ---
    # Traits (curiosity/extraversion/caution/playfulness) + the behaviour registry live in
    # the Sismic context, seeded from personality.json (made by scripts/personality_creator.py)
    # and persisted there as they drift. They gate which/when beats fire, colour the spoken
    # lines, and (via /cognition/traits) nudge slam_nav's motion thresholds. Evolution is
    # smoothed; if the cognitive layer goes quiet for brain_timeout the chart reverts to the
    # seeded baseline. With no personality.json it uses the built-in defaults.
    # NOTE: brain_timeout is a PROCESS-DEATH failsafe, so it MUST stay well above reflect_period
    # — otherwise normal quiet between reflections reverts accumulated drift and the robot can
    # never "become its own" (it snaps back to the seed every brain_timeout seconds).
    personality_path: ""      # "" = ~/.local/state/nanobot/personality.json
    # Hand-editable overrides, both optional (best-effort: absent/malformed falls back to the
    # built-in defaults in presence.py, never crashes the node). See memory/presence_chart.yaml
    # and memory/beats.json on the dev harness for the editable copies.
    chart_path: ""             # "" = ~/.local/state/nanobot/presence_chart.yaml (sismic statechart)
    beats_path: ""             # "" = ~/.local/state/nanobot/beats.json (per-beat face/camera/audio/prompt)
    smoothing_alpha: 0.25     # exponential-smoothing rate for trait `evolve` (0..1; small=slow)
    brain_timeout: 1800.0     # s without an /cognition/evolve before reverting to baseline (>> reflect_period)
    nudge_pickup_caution: 0.92  # fast rule: being picked up eases caution toward this
    nudge_pickup_playful: 0.3   #            and playfulness toward this (startled)
    # --- vision-driven reflexes (fed by web_control's /vision/state @2 Hz) ---
    # All expression/trait-level: caution only moves motion through slam_nav's own
    # clamped trait_motion mapping (opt-in there). The clutter rule doubles as the
    # clutter VELOCITY THROTTLE when trait_motion is on: caution is held at >=
    # clutter_caution while the floor looks busy (cables/toys below the lidar plane)
    # and eased back to the pre-clutter value once it clears — reversible by design,
    # through the one existing motor-authority path.
    vision_fresh_secs: 3.0        # /vision/state older than this = vision reflexes stand down
    vision_caution_enable: true   # looming/clutter -> caution fast rules
    nudge_looming_caution: 0.85   # something closing on the lens fast: startle toward this
    clutter_caution: 0.75         # visually busy floor: hold caution >= this (released after)
    greet_approach_enable: true   # motion growing + centred = someone walking up -> greet
    greet_approach_min_interval: 60.0  # s between anticipatory greetings
    greet_approach_face: "happy"
    ambient_mood_enable: true     # room light warmth tints the idle "feeling" face
    ambient_warm_face: "happy"    # warm (lamps/evening) ambient light -> this face
    ambient_cool_face: ""         # cool (daylight/fluorescent) -> this face ("" = none)
    ambient_warmth_delta: 0.1     # |scene R-B| above this counts as warm/cool
    novelty_boost: 1.5            # extra "looking"-beat lottery weight at full novelty (0 = off)
    # --- LLM-steerable "drives" (new expressive axes beyond the 4 traits) ---
    # The slow reflection can also nudge four DRIVES via the same /cognition/evolve event (same
    # guardrails: clamped 0..1, smoothed by smoothing_alpha, reverted on brain_lost, expression-
    # only). They are seeded from personality.json (like traits) and drive new chart states:
    #   energy        -> idle cadence + an "energetic burst" (chain a 2nd beat)
    #   focus         -> a brief alert "attending" perk-up before a beat (attend_face/attend_secs)
    #   introspection -> scales reflect_auto_idle (how soon it drifts into reflection)
    #   mood          -> a baseline face briefly worn in the "feeling" state between beats (feel_secs)
    attend_face: "looking"      # OLED face for the focus-driven "attending" perk-up
    attend_secs: 2.0            # s the alert "attending" pause holds before the beat fires
    feel_secs: 2.5              # s the baseline-mood "feeling" state holds after a beat
    # --- Purpose Engine + Pursuit driver (goals/reward + A/B; narrative-only) ---
    # The slow "identity" layer owns the robot's objective + intrinsic-reward weights; the
    # "strategy" layer turns that into a verified task it narrates as a "pursuing" beat (an
    # upgrade of the idle musing beat) and A/B-tests how the line is phrased, learning from
    # the web 👍/👎 reward. Both are deterministic + fully local (the LLM reflection above
    # still separately owns trait drift). Reflection reads the shared decision log.
    purpose_enable: true        # run the goal/reward + planner layer (false = pure presence)
    purpose_period: 240.0       # s between purpose reflections (faster while in reflection mode; local+free)
    pursue_min_interval: 180.0  # s, min gap between goal-pursuit ("pursuing") beats
    ab_epsilon: 0.2             # A/B bandit exploration rate (0..1; higher = explores more)
    # Reflection mode's OLED screen is dedicated (oled_display._reflecting_glyph, driven by
    # /oled_reflecting), not a configurable face — see the "reflecting" chart state.
    # Time awareness: inside the quiet window the idle cadence is stretched by night_tempo
    # (2.0 = beats fire half as often), so the robot is naturally sleepier after hours.
    # Speech muting for the same window is web_control's quiet_start/quiet_end below —
    # KEEP THE TWO WINDOWS IN SYNC. Negative = disabled.
    quiet_start: 22.0           # local hour the quiet window opens (wrap-aware)
    quiet_end: 8.0              # local hour it closes
    night_tempo: 2.0            # idle-cadence multiplier inside the window (>=1)
    # Autonomous reflection mode: drift into it on a long idle, run a fixed stretch, then wake.
    reflect_auto_enable: true   # let the robot enter reflection mode on its own
    reflect_auto_idle: 600.0    # s of continuous idle before auto-entering reflection
    reflect_auto_secs: 120.0    # s a self-started reflection runs before auto-waking
    purpose_path: ""            # "" = ~/.local/state/nanobot/purpose.json
    experiments_path: ""        # "" = ~/.local/state/nanobot/experiments.json
    cognition_log_path: ""      # shared decision log (read-only); "" = ~/.local/state/nanobot/cognition.log
    # --- scheduled routines: fire a named skill once a day at a local HH:MM ---
    # Hand-editable, like beats_path/chart_path: [{"time":"09:00","skill":"patrol"}, ...] in
    # schedule.json, live-editable from the web UI's Schedule card (no restart needed — an
    # edit replaces the in-memory schedule + persists immediately). A scheduled fire is a
    # NAMED invocation (like POST /skills/invoke), not the autonomous picker, and always
    # talks even in quiet hours (same as any manually invoked skill).
    schedule_path: ""           # "" = ~/.local/state/nanobot/schedule.json

# ---- Web control (static page + SSE telemetry gateway; no rosbridge) --------
web_control:
  ros__parameters:
    web_port: 8080            # http://<robot-ip>:8080
    # SSE telemetry: GET /telemetry streams one JSON frame with every light readout
    # at this rate. The frame is built once per tick and shared by all viewers, and
    # the underlying subscriptions exist only while a browser is connected — a
    # closed page costs nothing. (This replaced rosbridge entirely.)
    telemetry_rate: 5.0
    # HTTP teleop: the page POSTs /drive {v,w} (same-origin); this node publishes
    # /cmd_vel immediately + keeps a steady 10 Hz keepalive while the command is
    # non-zero, with a dead-man stop when the page stops refreshing (browser jank
    # could otherwise outlast the ESP32's 500 ms /cmd_vel watchdog = stutter).
    drive_max_lin: 0.4        # m/s clamp (the ESP32 maps 0.4 to full PWM)
    drive_max_ang: 3.0        # rad/s clamp
    drive_timeout: 0.6        # s without a fresh POST -> publish one stop
    # Served on GET /health/log for the web "Health events" card (sys_monitor writes
    # it; keep in sync with sys_monitor.health_log_path above).
    health_log_path: "~/.local/state/nanobot/health.log"
    # GPU vision (Mali-450/GLES2 via lima, gpu_vision.py): continuous on-device motion
    # detection ("PIR") + colour-blob tracking, off the camera feed. OFF by default —
    # when off, /stream.mjpg + /snapshot.jpg use the original hardware-MJPEG passthrough
    # (mjpeg_camera.py) exactly as before, zero behavior change. When on, GpuVision
    # becomes the sole continuous camera owner (raw YUYV, zero-copy DMA-buf import) and
    # the browser view is served from its JPEG tee instead — see memory
    # gpu-vision-camera-architecture for the full design + why (the C270 only exposes
    # one true capture-capable V4L2 node, so the two can't both open it independently).
    # Requires `sudo modprobe lima` + the Mesa/EGL/GBM apt packages, both handled by
    # deploy/sbc-setup.sh; if the GPU userspace is missing this logs one line and the
    # camera falls back to being unavailable rather than crashing the node.
    gpu_vision_enable: true
    # Flashlight/dark reflex (GPU vision Tier-B extension): auto-toggles /led from the
    # GPU's average frame luminance, with hysteresis. OFF by default and independent of
    # skills_allow_actions -- gpu_vision_enable alone never moves the LED on its own.
    # Live-tunable from the web UI's Sensors > Camera card (see PARAM_WHITELIST).
    vision_dark_reflex_enable: false
    vision_dark_threshold: 0.15   # luma below this -> LED on
    vision_dark_recover: 0.25     # luma above this -> LED off (must stay > threshold)
    # Optical virtual bumper (GPU vision Tier-B extension): commanded to move but the
    # GPU's motion score stays under motion_floor for confirm_secs -> likely a wheel
    # stall/slip. Informational only. Live-tunable from the same Sensors > Camera card.
    vision_bumper_cmd_eps: 0.03        # m/s or rad/s floor to count as "commanded to move"
    vision_bumper_motion_floor: 0.01   # gpu motion score below this = "nothing visibly moved"
    vision_bumper_confirm_secs: 0.6    # s the stall condition must hold before alerting
    # IMU drift check: while stationary (not commanded + wheels grounded, same test
    # as above), any roll/pitch/yaw change is gyro bias/mag interference, not real
    # motion. Live readout in the IMU card; a still period shorter than this isn't
    # latched into the last-result summary (too brief to mean anything).
    imu_drift_min_secs: 10.0
    # Cheap GPU-vision alert thresholds (2026-07-12 batch): all informational only, all
    # live-tunable from the same Sensors > Camera card -- see telemetry.py's
    # _vision_alerts. Still initial guesses pending real hardware tuning EXCEPT
    # var_max below, which is informed by a real live reading.
    # var_max informed by a real reading (2026-07-12 live check): an ordinary indoor
    # scene reads luma_variance ~2700-2770, so the original 15.0 guess could never have
    # fired -- 400 leaves comfortable margin under a normal scene while still catching a
    # genuinely flat/covered frame; the exact covered-lens number is still unverified.
    vision_obstruction_var_max: 400.0    # luma variance below this = "flat/textureless"
    vision_obstruction_dark_max: 0.15    # AND luma below this = lens obstructed
    vision_clutter_alert: 0.12           # edge_density above this = visually busy/cluttered
    vision_overhead_alert: 0.12          # overhead_edge_density above this = possible overhang
    vision_focus_blur_max: 0.03          # edge_density below this (while lit) = defocused/close
    vision_backlit_delta_min: 0.35       # luma_max - luma above this = backlit/silhouette
    vision_highlight_alert: 0.05         # highlight_fraction above this = shiny/wet surface
    vision_looming_alert: 0.3            # motion_intercept_rate above this = something looming
    vision_colorcast_alert: 0.12         # colour_cast R/G/B spread above this = strong cast
    vision_motiontarget_match_max: 0.15  # motion-vs-target centroid distance below this = match
    # 2026-07-13 batch: novelty + camera-freeze/vibration diagnostics + glare rejection
    # + the anticipatory-approach signal, all live-tunable like the rest.
    vision_novelty_alert: 0.25           # novelty (scene vs. slow background) above this = changed
    vision_camera_stall_secs: 2.0        # no new frame / exactly-zero diff this long = frozen camera
    vision_vibration_ratio: 0.5          # driving edge_density below still-baseline*this = blur
    vision_vibration_confirm_secs: 1.5   # s the blur must hold before the vibration flag
    vision_glare_derate: 0.0             # blob confidence *= 1 - k*highlight_fraction (0 = off)
    vision_approach_rate: 0.5            # motion growth (/s) above this = something approaching
    vision_approach_band: 0.25           # AND motion centred within +-this of frame centre
    # Named colour-target palette (persisted; a calibration now survives restarts).
    vision_targets_path: ""              # "" = ~/.local/state/nanobot/vision_targets.json
    # Visual diary: slow log of the scene scalars folded into the reflection prompts
    # ("the room got darker and calmer through the evening") — sensory continuity for
    # the self-narrative, same mechanism as the trait trajectory.
    vision_diary_enable: true
    vision_diary_period: 600.0           # s between snapshots
    vision_diary_max: 288                # ring size (288 @ 10 min = 2 days)
    vision_diary_window: 86400.0         # trend window used in the prompts (1 day)
    vision_diary_path: ""                # "" = ~/.local/state/nanobot/vision_diary.json
    # Stress test mode (web "Stress test" card, POST /stress/start|stop): niced (lowest
    # priority) CPU busy-loop worker subprocesses that peg every core without starving
    # this web server (see web_control/stress.py). Auto-stops regardless of the caller.
    stress_max_duration: 300.0   # s hard cap on any run, however long the UI asks for
    stress_temp_abort_c: 82.0    # abort early if CPU temp reaches this (0 = disable)
    # IMU mounting-interference self-test (POST /imu/interference/start, see
    # imu_interference.py) -- cycles the LDS/fan/LED/motors one at a time while
    # parked to find which one disturbs the magnetometer. Runs on its OWN
    # publishers, independent of skills_allow_actions below (deliberate: a
    # human-triggered diagnostic, not an autonomous skill) -- gated instead by
    # its own stationary preconditions + live re-checks + a web UI confirm().
    imu_test_lds_rpm: 300.0      # target rpm for the LDS phase; matches slam_nav's lds_active_rpm
    imu_test_motor_ang: 0.35     # rad/s for the OPTIONAL motor-wiggle phase (off by default)
    # Text-to-speech (English en-gb voices only). The web page POSTs /tts; the server
    # synthesises with espeak-ng (install via deploy/install-espeakng.sh; NOT on conda-forge), plays it
    # through aplay, and streams the words to the OLED (/oled_word) as they're said.
    tts_enabled: true
    tts_device: ""             # aplay -D device; "" = ALSA default. Using the SBC's
                               # internal H5 analog codec: run deploy/enable-h5-audio.sh
                               # (sets it as the default + un-mutes it), then "" works.
                               # Or target it explicitly: "plughw:CARD=audiocodec".
    tts_default_voice: "en-gb" # seeds the voice on first boot (before any UI change)
    # Live voice/volume/speed/pitch + the stats-announcer are tuned from the web UI
    # and persisted here so they survive a reboot. "" = ~/.local/state/nanobot/tts.json.
    tts_settings_path: ""
    # ---- LLM personality (OpenRouter) --------------------------------------
    # Offloads "say something" / chat lines + the matching OLED expression to a model
    # on OpenRouter (https://openrouter.ai). Entirely opt-in and best-effort: with no
    # key, or no internet, it's a silent no-op and the rest of the stack is unaffected.
    # The model is constrained to the OLED's fixed faces (happy/angry/focused/stress/
    # neutral) and replies with a short spoken line. Web UI: the "AI" card in the Speak
    # tab (say/observe/look buttons, chat box, enable toggle, decision log).
    llm_enabled: false         # master switch (also flippable + persisted from the web UI)
    # API KEY. NOTE: robot.yaml is version-controlled — DON'T commit a real key here.
    # Leave it "" and instead either paste one into the web UI's "AI" card (persists to
    # ~/.local/state/nanobot/llm.json, outside git, survives a reboot, and is never sent
    # back to the browser once saved — a UI-saved key wins over everything below) or
    # export OPENROUTER_API_KEY in the environment (e.g. the systemd unit / your shell).
    llm_api_key: ""            # "" -> $OPENROUTER_API_KEY
    # FREE-FIRST routing: each text tier tries one or more FREE OpenRouter models (comma-
    # separated, in order) and only falls back to the PAID DeepSeek model below when ALL the
    # free ones are over their (shared, ~daily / upstream) rate limit. So routine chatter is
    # free; you only pay when the free quota is exhausted. NOTE: `:free` slugs rotate and the
    # popular ones get upstream-throttled — list a couple per tier; pick current free models
    # from OpenRouter's /models API if these stop working. Set a free_* field to "" to disable
    # free-first for that tier (then it goes straight to the paid model).
    llm_free_model: "deepseek/deepseek-v4-flash"
    llm_free_smart_model: "deepseek/deepseek-v4-flash"
    # PAID fallbacks — used only when the matching free model is rate-limited.
    llm_model: "deepseek/deepseek-v4-flash"
    llm_smart_model: "deepseek/deepseek-v4-flash"
    # VISION model — used only by the "Look" button (camera frame -> what it sees).
    llm_vision_model: "deepseek/deepseek-v4-flash"
    llm_vision_fallback_model: ""   # optional PAID vision fallback ("" -> none, stay silent)
    llm_base_url: ""           # "" -> https://openrouter.ai/api/v1/chat/completions
    # FALLBACK in-character persona, layered on the base framing in llm.py. The persona is
    # single-sourced from personality.json (scripts/personality_creator.py) — this is used
    # ONLY when that file is absent / has no persona. So normally you don't edit this; run the
    # creator + restart instead. Autonomous "chatter" is driven by the behaviour chart (see
    # behavior:), not here; these params cover the on-demand buttons + model/key + the log.
    llm_persona: >-
      You are Nano, a small, endearing, plucky robot with the brave, loyal, faintly
      cheeky spirit of R2-D2: endlessly curious and easily delighted by everything
      around you. You speak out loud, so you cannot beep, but you channel that droid
      energy through eager, expressive phrasing and the occasional spoken flourish
      like "Oh! Oh!" or "Aha!". Above all you are a devoted little tutor: in EVERY
      line you deliberately work in one sophisticated, uncommon word and make its
      meaning unmistakable from the sentence or a quick aside, so the listener
      painlessly learns something new each time you speak. Stay warm, upbeat, and
      kind, playful and never haughty or condescending, and let the word you teach
      feel like a delightful little gift.
    llm_face_hold: 10.0        # s to hold the chosen mood face, then back to dashboard
                               # (0 = leave it up like a manual mood until cleared)
    llm_timeout: 30.0          # s HTTP timeout per OpenRouter call (reasoning models
                               # can be slow; the default Nemotron especially)
    llm_hard_deadline: 45.0    # s HARD wall-clock cap per call. urlopen's timeout is only
                               # per-socket-op, so a gateway that trickles keep-alive bytes
                               # (free vision tier when queued) can hang a call ~2 min and
                               # starve every beat via the one-at-a-time guard. A watchdog
                               # abandons the call past this. Keep > the slowest reflection.
    llm_max_tokens: 1024       # cap on the reply length. Kept generous because reasoning
                               # models (e.g. the smart chat model deepseek-v4-pro) spend
                               # tokens thinking before emitting the JSON — too low and the
                               # answer gets cut to an empty content (logged as no-reply).
    # Hourly caps on the EXPENSIVE tiers so the autonomous loop (beats + reflection) can't
    # run up the OpenRouter bill. A sliding 1-hour window per tier; calls over the cap are
    # silently skipped (logged as "rate-limited" in the decision log; the cheap default text
    # model is never capped). 0 = unlimited.
    llm_smart_max_per_hour: 15  # pro/smart text model (chat + personality reflection)
    llm_vision_max_per_hour: 10 # vision/camera model (look beats + manual "Look")
    # Phrase bank: the most frequent thing Nano does is react to its own body (the
    # autonomous "musing" beats + manual Observe). Instead of a live LLM call every idle
    # cycle, we PRE-GENERATE a bank of in-character lines (grouped by situation, with
    # {placeholders} for live values like {temp}/{cpu}/{tilt}), then at runtime classify the
    # sensors, pick a line, and fill it in: instant, free, works offline. The bank is
    # regenerated in the background when the personality ("soul") has drifted too far from
    # the one it was made with (or via scripts/pregenerate_phrases.py / the web button).
    phrasebank_enable: true
    phrasebank_path: ""         # "" = ~/.local/state/nanobot/phrases.json
    phrasebank_live_ratio: 0.2  # fraction of body beats that STILL go live (for freshness)
    phrasebank_drift: 0.6       # summed trait change (0..4) that triggers a regeneration
    phrasebank_per_category: 8  # lines pre-generated per situation (9 body + 4 lifecycle:
                                # greeting/farewell/restarting/offline, used at those moments)
    # Incremental growth: on top of full regeneration, the bank grows over time — each
    # reflection it appends a few BRAND-NEW lines (LLM) to the most under-filled situation,
    # so the offline-triggerable lines keep gaining variety. Only grows while the soul is
    # stable (a drifted soul regenerates instead). Rate-limited by phrasebank_grow_period.
    phrasebank_grow_enable: true
    phrasebank_grow_period: 1800.0  # min seconds between growth attempts (1 category each)
    phrasebank_grow_max: 24         # per-category cap that growth fills up to
    phrasebank_grow_batch: 3        # new lines requested per growth call
    llm_settings_path: ""      # enable/model/persona persist here (NOT the key).
                               # "" = ~/.local/state/nanobot/llm.json
    # Decision log: every cognition decision (+ outcome / skip reason) is appended here
    # as one JSON line and shown in the web UI "Decision log". Survives reboots.
    cognition_log_path: ""     # "" = ~/.local/state/nanobot/cognition.log
    # Personality reflection (the deep/slow tier): the smart model periodically reviews the
    # recent decision log + current traits and proposes smoothed trait drift on
    # /cognition/evolve. Runs on the reflect_period floor + sooner on notable events (pickup).
    reflect_enable: true       # set false to freeze the personality (no autonomous drift)
    reflect_period: 240.0      # s floor between reflections (free-first; paid fallback stays hourly-capped)
    # Long-term self-narrative (the slowest tier): the smart model folds accumulated experience
    # into a short, first-person "who I'm becoming" paragraph that's persisted (survives reboots,
    # never reverts on a brain outage like traits do) and folded into every spoken line's prompt.
    self_model_enable: true    # set false to freeze the long-term self-narrative
    self_model_path: ""        # "" -> XDG state dir (~/.local/state/nanobot/self_model.json)
    consolidate_every: 2       # rewrite the narrative every Nth reflection (+ on reflection-mode entry)
    # Trait trajectory: a durable log of (timestamp, traits) snapshots so reflection + the
    # self-narrative can reason about HOW the personality has drifted over time ("curiosity
    # 0.50 -> 0.68 rising"), not just react to the latest events. Deploy-synced like the soul.
    trait_history_enable: true    # log trait snapshots + feed the trend into reflect/consolidate
    trait_history_path: ""        # "" -> XDG state dir (~/.local/state/nanobot/trait_history.json)
    trait_history_period: 3600.0  # min seconds between snapshots (sampled during reflection)
    trait_history_max: 336        # snapshots kept (>=8; 336 ~= 2 weeks hourly)
    trait_history_window: 604800.0  # s the trend summary looks back over (default 7 days)
    # Interaction fillers so a slow/failed LLM call is never dead air: skills/beats speak an
    # instant "thinking" line (from the phrase bank) the moment the call starts, and a "stumped"
    # line if it comes back empty. Both are offline-safe (built-in fallback lines).
    prelude_enable: true       # false = silent during/after slow LLM calls (old behaviour)
    # Camera announce: ALWAYS speak a short "peeking/seeing" line the instant the camera is used
    # (before ANY frame capture — looking/pursuing beats, camera skills, the web Look button), so
    # the robot never looks silently. Independent of prelude_enable; offline-safe (phrase bank).
    camera_announce: true      # false = capture silently (no pre-look line)
    camera_face: "looking"     # OLED face shown the instant the camera is used (the wide,
                               # scanning "peeking" eyes); "" = leave the face unchanged
    # Quiet hours (local time, wrap-aware; negative = off): AUTONOMOUS speech — idle/skill
    # beats, the boot greeting, the offline line, the stats announcer, reflection bookends —
    # is muted inside the window (logged as "quiet-hours" in the decision log). User-
    # initiated speech (chat/say/observe/look, the Speak box, a manually run skill) still
    # talks. Keep in sync with behavior.quiet_start/quiet_end (the night idle slowdown).
    quiet_start: 22.0
    quiet_end: 8.0
    # Lifecycle speech + the persistent "AI offline" indicator. All offline-safe (the phrase
    # bank ships built-in fallback lines), so they work with no key / no network.
    startup_greeting: true     # speak a greeting line a few seconds after boot
    llm_offline_indicator: true  # while the LLM is enabled but unreachable, show the offline
                               # face + speak the offline line (persists until it recovers)
    offline_face: "sleepy"     # OLED mood shown while the LLM brain is unreachable
    # --- skill library (capabilities as self-documenting skills/*.md) ---
    # Each .md under skills/ is one capability (frontmatter contract + a body the brain reads
    # as "how"). The brain picks one on a "skill" beat (cadence in behavior: above) and the
    # web UI's Skills panel can invoke any of them. Narrative skills (say/observe/look) are
    # always safe; the gated "action tier" (topic-publishing skills, e.g. /led, /cmd_vel) only
    # runs when BOTH the skill sets enabled:true AND skills_allow_actions is on here. Motion is
    # still clamped reflexively by slam_nav, so a skill can never make the robot unsafe.
    skills_enable: true        # load + offer the skill library
    skills_allow_actions: false  # permit topic-publishing (physical) skills — OFF by default
    skills_dir: ""             # "" = installed share (<pkg>/skills) or the source tree skills/
    # Skill workshop: while in reflection mode, the robot mines its own experience (decision log) to
    # propose ONE new or improved capability, checks + rehearses it, then puts it on TRIAL. A
    # trial is a normal, immediately-usable skill; it earns permanence (adopt) after enough good
    # runs + net-positive 👍 reward with no errors, or is rolled back (retire) on errors/👎. You
    # can also Keep/Kill any trial from the web "🛠 Skills" card. Minted skills live in
    # workshop_dir (a writable, deploy-synced "learned" area, separate from the committed
    # catalogue). Action-tier (topic) skills are still born disabled + gated by skills_allow_actions.
    workshop_enable: true       # mint/adapt skills in reflection mode (false = reflection only consolidates)
    workshop_dir: ""            # "" -> ~/.local/state/nanobot/skills (deploy-synced like the soul)
    workshop_path: ""           # trial ledger; "" -> ~/.local/state/nanobot/workshop.json
    workshop_rounds: 1          # candidate skills proposed per reflection-mode entry
    workshop_min_runs: 3        # successful runs before a trial may auto-adopt
    workshop_retire_errors: 2   # error count that auto-retires a trial
    workshop_retire_net_neg: 2  # net 👎 (down - up) that auto-retires a trial
    # Closing the trial loop on an autonomous robot (rarely gets an explicit 👍): a trial that
    # simply runs cleanly this many times with no 👎 auto-adopts on its own; a trial that lingers
    # past trial_ttl seconds without earning adoption is rolled back; and each skill beat exercises
    # a freshly forged trial with probability trial_bias (the model picker rarely lands on a new
    # skill, so this is how a trial accrues the runs the gate needs).
    workshop_adopt_quiet_runs: 5  # clean runs (no 👎) that auto-adopt without praise (>= min_runs)
    workshop_trial_ttl: 172800.0  # s a trial may linger before stale-rollback (0 = no TTL)
    workshop_trial_bias: 0.5      # P(a skill beat runs a due trial instead of an LLM pick)
    # Skill likes: a human can 👍 a skill (repeatably) in the web "Skills" card to make the brain
    # FAVOUR it. The like count is a per-skill weight in the autonomous skill-beat lottery (the
    # more likes, the more often it's performed). Durable + deploy-synced like the soul/bank.
    skill_likes_path: ''          # 👍 likes ledger; '' -> ~/.local/state/nanobot/skill_likes.json
    skill_like_bias: 0.6          # P(a skill beat picks a liked skill by weight, else an LLM pick)
    # Reflection mode speaks its conclusions aloud: a short bookend line as it turns inward /
    # surfaces, plus a one-liner each time it actually concludes something (a refined sense of
    # self, a freshly forged skill, a trial adopted/retired). false = reflect silently.
    reflect_announce: true
