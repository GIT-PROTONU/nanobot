# =============================================================================
# Central hardware/parameter config for the Nano robot.
# All values are tuned for the NanoPi NEO Plus2 (Allwinner H5) — cross-check pin
# / bus choices against ../../nanopi-neo-plus2-pinmap.md.
#
# Bus reminders from the pinmap:
#   I2C0 -> /dev/i2c-0 (PA11/PA12)   I2C1 -> /dev/i2c-1 (PA18/PA19)
#   I2C2 -> /dev/i2c-2 (PE12/PE13)   UART2 -> /dev/ttyS2 (PA0/PA1)
#   UART1 -> /dev/ttyS1 (PG6/PG7) -- normally on-board Bluetooth; freed for the
#            LDS via the `uart1` overlay (Bluetooth is therefore disabled).
#   GPIO main PIO = /dev/gpiochip0, global# = bank*32 + pin (PA0=0, PG=192, ...)
# Enable the buses first via armbianEnv.txt overlays (see README + pinmap).
# =============================================================================

# ---- Rust LDS node (sensor_msgs/LaserScan on /scan) -------------------------
lds_driver:
  ros__parameters:
    port: "/dev/ttyS1"        # LDS02RR data UART on UART1/PG6-PG7 (@115200)
    baud: 115200
    frame_id: "laser"
    clockwise: true           # LDS02RR spins CW; node converts to ROS CCW frame
    angle_offset_deg: 0.0     # mechanical mounting offset of the 0deg ray
    range_min: 0.12           # metres
    range_max: 6.0            # metres
    publish_rate: 10.0        # Hz cap on /scan (motor ~5 Hz; lower = decimate)

# ---- Wheel encoders -> odometry (nav_msgs/Odometry on /odom + TF) -----------
# Wheel ticks are counted on the ESP32 coprocessor and streamed as
# std_msgs/Int64MultiArray on /wheel_ticks; this node only integrates. Wire/
# direction fixes live in firmware/nanobot_coprocessor/include/config.h.
wheel_odometry:
  ros__parameters:
    ticks_topic: "wheel_ticks"  # from the ESP32 zenoh-pico coprocessor
    ticks_per_rev: 1440       # encoder counts per wheel revolution (x4 quadrature)
    wheel_radius: 0.0335      # metres
    wheel_separation: 0.16    # metres between wheel contact points
    invert_left: false        # SBC-side fallback (normally inverted on the ESP32)
    invert_right: false
    publish_rate: 30.0        # Hz, odom/TF publish rate
    publish_tf: true
    odom_frame: "odom"
    base_frame: "base_link"

# ---- cmd_vel -> PCA9685 PWM motor driver ------------------------------------
# RETIRED: the ESP32 coprocessor now owns /cmd_vel -> H-bridge PWM directly (see
# firmware/nanobot_coprocessor). This node is no longer launched by stack.sh; kept
# here only for the optional PCA9685 LDS-spin/aux channels if you re-enable it.
motor_control:
  ros__parameters:
    i2c_bus: 1                # /dev/i2c-1
    i2c_address: 0x40         # PCA9685 default
    pwm_freq_hz: 1000.0       # motor-driver PWM carrier (servos: use 50)
    # Differential drive limits.
    wheel_separation: 0.16
    max_linear_speed: 0.4     # m/s mapped to full PWM
    max_angular_speed: 3.0    # rad/s mapped to full PWM
    cmd_timeout: 0.5          # s; stop motors if no /cmd_vel arrives
    # PCA9685 channel wiring. Two channels per motor when driving an H-bridge
    # in PWM+PWM mode (forward channel / reverse channel).
    left_fwd_ch: 0
    left_rev_ch: 1
    right_fwd_ch: 2
    right_rev_ch: 3
    # Optional: drive the LDS spin motor at a constant duty from a spare channel.
    lds_motor_ch: -1          # -1 = disabled
    lds_motor_duty: 0.55

# ---- Status -> SSD1306 OLED -------------------------------------------------
oled_display:
  ros__parameters:
    i2c_bus: 0                # /dev/i2c-0 (OLED wired to I2C0, PA11/PA12)
    i2c_address: 0x3C         # SSD1306 default
    width: 128
    height: 64
    refresh_rate: 2.0         # Hz
    show_ip: true             # show the wlan/eth IP so you can find the web UI

# ---- BWT901CL 9-axis IMU (WitMotion, USB-serial via CH340) ------------------
imu_driver:
  ros__parameters:
    port: "/dev/imu"          # stable udev symlink (CH340 by VID:PID, any USB port)
    baud: 115200              # BWT901CL is fixed at 115200
    frame_id: "imu_link"
    publish_rate: 50.0        # Hz; /imu/data rate. The device stream rate auto-
                              # follows this (so lowering it cuts parse CPU too).
    euler_rate: 25.0          # Hz; /imu/euler only feeds the web angle display
    mag_rate: 10.0            # Hz; /imu/mag is slow-moving + unused by the UI
    output_rate_hz: 0         # 0 = device streams at publish_rate; >0 pins it

# ---- Board health monitor -> diagnostic_msgs/DiagnosticArray on /diagnostics -
sys_monitor:
  ros__parameters:
    publish_rate: 1.0         # Hz; CPU/mem/temp/disk are slow-moving

# ---- Web control (rosbridge websocket + static page) ------------------------
web_control:
  ros__parameters:
    web_port: 8080            # http://<robot-ip>:8080
    rosbridge_port: 9090      # websocket roslib connects to
