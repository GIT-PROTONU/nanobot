; ---------------------------------------------------------------------------
; zenoh-pico ONE-TOPIC SPIKE (de-risk, not the production firmware).
;
; Goal: prove an ESP32 running zenoh-pico, connected over USB serial (UART0) to a
; zenohd router LISTENing on that serial port, shows up as a real ROS 2 topic to a
; plain rmw_zenoh subscriber on Humble — no micro-ROS agent, no DDS anywhere.
;
; It publishes std_msgs/Int32 on /esp32_heartbeat using the exact rmw_zenoh wire
; format captured on this stack (keyexpr 0/esp32_heartbeat/std_msgs::msg::dds_::Int32_/
; TypeHashNotSupported; CDR-LE payload; attachment = seq i64 + ts i64 + 0x10 + 16B gid).
;
; Host side (router serial listener):
;   ZENOH_ROUTER_CONFIG_URI=<cfg with listen "serial//dev/ttyUSB0#baudrate=115200">
;   then run rmw_zenohd; verify with `ros2 topic echo /esp32_heartbeat std_msgs/msg/Int32`.
; ---------------------------------------------------------------------------
[env:esp32dev]
platform = espressif32@6.9.0
board = esp32dev
framework = arduino
monitor_speed = 115200

lib_deps =
    https://github.com/eclipse-zenoh/zenoh-pico.git#1.9.0

; zenoh-pico's shipped config.h hard-#defines the features (its CMake-generated block),
; so plain -DZ_FEATURE_* build flags are overridden. Instead use ZENOH_GENERIC: the lib
; then includes our include/zenoh_generic_config.h (which enables Z_FEATURE_LINK_SERIAL).
; This survives a lib re-fetch. -I include makes the header resolvable from the lib.
build_flags =
    -DZENOH_GENERIC
    -I include

; Patch zenoh-pico's arduino-esp32 serial open to use explicit UART pins (its default
; begin(baudrate) didn't drive GPIO17 reliably). Runs before each build.
extra_scripts = pre:patch_zenohpico.py
