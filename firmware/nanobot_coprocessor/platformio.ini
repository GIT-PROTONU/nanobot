; ---------------------------------------------------------------------------
; nanobot_coprocessor — production ESP32-WROOM firmware (native zenoh-pico).
;
; Joins the SBC's Humble rmw_zenoh graph directly over a UART2 serial link (no
; micro-ROS agent, no DDS), emitting rmw_zenoh's exact wire format + liveliness
; tokens. Topic contract + multicore layout: see src/main.cpp header. Link routing
; (serial-capable zenohd) + wiring: see README.md.
;
; Build / flash from the dev PC only (NOT on the board):
;   pio run -t upload        # flash over USB/UART0
;   pio device monitor       # debug console @115200 on the CP2102 port
; ---------------------------------------------------------------------------
[env:esp32dev]
platform = espressif32@6.9.0
board = esp32dev
framework = arduino
monitor_speed = 115200

lib_deps =
    https://github.com/eclipse-zenoh/zenoh-pico.git#1.9.0

; zenoh-pico's shipped config.h hard-#defines the features (its CMake-generated block),
; so plain -DZ_FEATURE_* build flags are overridden. Instead use ZENOH_GENERIC: the lib
; then includes our include/zenoh_generic_config.h (which enables Z_FEATURE_LINK_SERIAL).
; This survives a lib re-fetch. -I include makes the header resolvable from the lib.
build_flags =
    -DZENOH_GENERIC
    -I include

; Patch zenoh-pico's arduino-esp32 serial open to use explicit UART pins (its default
; begin(baudrate) didn't drive GPIO17 reliably). Runs before each build.
extra_scripts = pre:patch_zenohpico.py
