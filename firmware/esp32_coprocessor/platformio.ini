; ESP32-WROOM motor/encoder coprocessor for the Nano robot.
;
; micro-ROS client over serial (USB UART0). Bridged to the ROS 2 graph by
; micro_ros_agent (on the dev PC over COMx now, on the board over /dev/ttyUSB*
; later). See README.md for the agent command + wiring.
;
; Contract (standard messages only, so any stock agent bridges it with no
; custom-type rebuild):
;   sub  cmd_vel     geometry_msgs/Twist        -> diff-drive mix -> H-bridge PWM
;   pub  wheel_ticks std_msgs/Int64MultiArray   [left, right] raw cumulative counts

[env:esp32dev]
; Pin the platform: micro_ros_platformio tracks specific Arduino-core versions and
; newer espressif32 releases have broken its precompiled lib in the past. 6.9.0 =
; Arduino core 2.0.x (IDF 4.4), a known-good combo for the humble micro-ROS lib.
platform = espressif32@6.9.0
board = esp32dev
framework = arduino

; Serial transport runs on UART0/USB at 115200 — the agent must match this baud.
; (No serial debug prints: that same port is the micro-ROS link.)
board_microros_distro = humble
board_microros_transport = serial
monitor_speed = 115200

lib_deps =
    https://github.com/micro-ROS/micro_ros_platformio
    madhephaestus/ESP32Encoder@^0.11.7
